<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>测试下载网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            text-align: center;
        }

        .page-header {
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #111111;
            letter-spacing: -0.2px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin: 2rem 0 1rem;
        }

        .test-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            padding: 0.75rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 500;
            font-family: inherit;
            background-color: #f5f7fb;
            border: 1px solid #dce3ec;
            border-radius: 10px;
            color: #1f2a44;
            cursor: pointer;
            transition: none;
            box-shadow: none;
            text-decoration: none;
            background: #f5f7fb;
            letter-spacing: 0.3px;
        }

        .test-btn:hover,
        .test-btn:active,
        .test-btn:focus {
            background-color: #f5f7fb;
            border-color: #dce3ec;
            transform: none;
            box-shadow: none;
            transition: none;
            outline: none;
        }

        .footer-note {
            margin-top: 3.5rem;
            padding-top: 1.2rem;
            font-size: 0.85rem;
            color: #8e8e9e;
            border-top: 1px solid #f0f0f2;
            text-align: center;
            font-weight: 400;
        }

        @media (max-width: 550px) {
            .button-group {
                gap: 1rem;
                flex-direction: column;
                width: 100%;
            }
            .test-btn {
                width: 80%;
                min-width: auto;
            }
            .page-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>测试下载网页</h1>
    </div>

    <div class="button-group">
        <button class="test-btn" id="testBtn1">test</button>
        <button class="test-btn" id="testBtn2">test</button>
        <button class="test-btn" id="testBtn3">test</button>
    </div>

    <div class="footer-note">
        仅供测试。
    </div>
</div>

<script>
    const BUTTON1_URL = 'https://www.bing.com';
    const BUTTON2_URL = 'https://www.baidu.com';
    const BUTTON3_URL = 'https://www.bilibili.com';

    function navigateTo(url) {
        let finalUrl = url.trim();
        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
            finalUrl = 'https://' + finalUrl;
        }
        window.location.href = finalUrl;
    }

    const btn1 = document.getElementById('testBtn1');
    const btn2 = document.getElementById('testBtn2');
    const btn3 = document.getElementById('testBtn3');

    if (btn1) {
        btn1.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(BUTTON1_URL);
        });
    }
    if (btn2) {
        btn2.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(BUTTON2_URL);
        });
    }
    if (btn3) {
        btn3.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(BUTTON3_URL);
        });
    }
</script>
</body>
</html>
